<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outreach HQ — Protest Marketplace</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 0 auto; padding: 2rem 1rem; background: #fafafa; }
    h1 { font-size: 1.6rem; }
    .sub { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .badge { display: inline-block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 0.15rem 0.5rem; border-radius: 3px; background: #e63946; color: white; }
    .event { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
    .event h3 { font-size: 1.1rem; margin-bottom: 0.4rem; }
    .event .meta { font-size: 0.8rem; color: #888; margin-bottom: 0.5rem; }
    .event p { font-size: 0.9rem; color: #444; margin-bottom: 0.75rem; line-height: 1.5; }
    .event button { padding: 0.4rem 1rem; background: #e63946; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .event button:hover { background: #c1121f; }
    .event button.joined { background: #2a9d8f; cursor: default; }
    .agent-note { background: #f0f0f0; border-radius: 8px; padding: 1rem; font-size: 0.8rem; color: #666; margin-bottom: 1.5rem; line-height: 1.5; }
    .empty { color: #aaa; font-style: italic; padding: 2rem 0; text-align: center; }
  </style>
</head>
<body>
  <h1>Outreach HQ</h1>
  <p class="sub">AI-generated protest events. New events appear automatically.</p>
  <div class="agent-note">An AI agent reviews current issues and generates new protest events on a regular schedule. Events below are created and maintained by the agent.</div>
  <div id="events"><p class="empty">Loading events...</p></div>

  <script>
    const joined = JSON.parse(localStorage.getItem('ohq-joined') || '{}');

    fetch('events.json')
      .then(r => r.json())
      .then(events => {
        const el = document.getElementById('events');
        if (!events.length) { el.innerHTML = '<p class="empty">No events yet.</p>'; return; }
        el.innerHTML = events.map(e => `
          <div class="event">
            <span class="badge">${e.cause}</span>
            <h3>${e.title}</h3>
            <div class="meta">${e.date} at ${e.time} &middot; ${e.location}</div>
            <p>${e.description}</p>
            <button ${joined[e.id] ? 'class="joined" disabled' : `onclick="join(this,${e.id})"`}>
              ${joined[e.id] ? 'Joined' : "I'm in"}
            </button>
          </div>
        `).join('');
      });

    window.join = (btn, id) => {
      joined[id] = true;
      localStorage.setItem('ohq-joined', JSON.stringify(joined));
      btn.textContent = 'Joined';
      btn.className = 'joined';
      btn.disabled = true;
    };
  </script>
</body>
</html>
