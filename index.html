<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outreach HQ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .sub { color: #888; font-size: 0.85rem; margin-bottom: 2rem; }
    form { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; }
    input, select { padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
    button { padding: 0.5rem 1rem; background: #e63946; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #c1121f; }
    .task { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; border-bottom: 1px solid #eee; }
    .task.done { opacity: 0.4; text-decoration: line-through; }
    .task input[type="checkbox"] { width: 18px; height: 18px; }
    .task .info { flex: 1; }
    .task .channel { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; background: #eee; padding: 0.1rem 0.4rem; border-radius: 3px; }
    .task .who { color: #888; font-size: 0.8rem; }
    .task .del { background: none; color: #ccc; padding: 0; font-size: 1.2rem; }
    .task .del:hover { color: #e63946; background: none; }
    .empty { color: #aaa; font-style: italic; padding: 1rem 0; }
  </style>
</head>
<body>
  <h1>Outreach HQ</h1>
  <p class="sub">Add outreach tasks, assign volunteers, check them off.</p>

  <form id="form">
    <input type="text" id="what" placeholder="Task (e.g., Call voters in District 5)" required>
    <input type="text" id="who" placeholder="Volunteer name">
    <select id="channel">
      <option value="phone">Phone</option>
      <option value="email">Email</option>
      <option value="sms">SMS</option>
      <option value="social">Social</option>
    </select>
    <button type="submit">Add Task</button>
  </form>

  <div id="list"></div>

  <script>
    const tasks = JSON.parse(localStorage.getItem('ohq') || '[]');

    function save() { localStorage.setItem('ohq', JSON.stringify(tasks)); }

    function render() {
      const el = document.getElementById('list');
      if (!tasks.length) { el.innerHTML = '<p class="empty">No tasks yet.</p>'; return; }
      el.innerHTML = tasks.map((t, i) => `
        <div class="task ${t.done ? 'done' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${i})">
          <div class="info">
            <div>${t.what}</div>
            <span class="who">${t.who || 'Unassigned'}</span>
          </div>
          <span class="channel">${t.channel}</span>
          <button class="del" onclick="del(${i})">&times;</button>
        </div>
      `).join('');
    }

    document.getElementById('form').onsubmit = (e) => {
      e.preventDefault();
      tasks.push({
        what: document.getElementById('what').value.trim(),
        who: document.getElementById('who').value.trim(),
        channel: document.getElementById('channel').value,
        done: false
      });
      save(); render(); e.target.reset();
    };

    window.toggle = (i) => { tasks[i].done = !tasks[i].done; save(); render(); };
    window.del = (i) => { tasks.splice(i, 1); save(); render(); };

    render();
  </script>
</body>
</html>
